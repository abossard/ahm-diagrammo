<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ahm-diagrammo — Markdown diagram editor</title>
  <link rel="stylesheet" href="web/style.css">
</head>
<body>
  <header>
    <h1>ahm-diagrammo editor</h1>
    <p>Edit Markdown and preview its Mermaid health-model blocks as ahm-diagrammo swimlane diagrams, entirely in the browser.</p>
    <div class="toolbar">
      <label for="example-select">Example</label>
      <select id="example-select"></select>
      <span id="status" role="status" aria-live="polite"></span>
    </div>
  </header>
  <main>
    <div class="pane">
      <h2 id="editor-label">Markdown source</h2>
      <textarea id="editor" aria-labelledby="editor-label" spellcheck="false"></textarea>
    </div>
    <div class="pane">
      <h2 id="output-label">Rendered diagrams</h2>
      <div id="output" role="region" aria-labelledby="output-label"></div>
    </div>
  </main>
  <script type="module" src="web/app.mjs"></script>
</body>
</html>
