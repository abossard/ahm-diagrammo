name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18
          - 22
          - 24
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run complete test suite
        run: npm test

  package:
    name: Pack and verify CLI aliases
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Pack npm artifact
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          pack_dir="${RUNNER_TEMP}/diagrammo-pack"
          consumer_dir="${RUNNER_TEMP}/diagrammo-consumer"
          rm -rf "${pack_dir}" "${consumer_dir}"
          mkdir -p "${pack_dir}" "${consumer_dir}"

          package_name="$(node -p "require('${GITHUB_WORKSPACE}/package.json').name")"
          package_version="$(node -p "require('${GITHUB_WORKSPACE}/package.json').version")"
          pack_json="$(npm pack --json --pack-destination "${pack_dir}")"
          filename="$(node -e '
            const [entry] = JSON.parse(process.argv[1]);
            if (!entry || entry.name !== process.argv[2] || entry.version !== process.argv[3] || !entry.filename) {
              console.error("packed metadata does not match package.json");
              process.exit(1);
            }
            process.stdout.write(entry.filename);
          ' "${pack_json}" "${package_name}" "${package_version}")"

          echo "tarball=${pack_dir}/${filename}" >> "${GITHUB_OUTPUT}"
          echo "consumer=${consumer_dir}" >> "${GITHUB_OUTPUT}"
      - name: Execute both packed CLI aliases
        shell: bash
        working-directory: ${{ steps.pack.outputs.consumer }}
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          set -euo pipefail
          if [[ -n "$(find . -mindepth 1 -maxdepth 1 -print -quit)" ]]; then
            echo "consumer directory is not empty" >&2
            exit 1
          fi

          expected="$(node -p "require('${GITHUB_WORKSPACE}/package.json').version")"
          diagrammo_version="$(npx --yes --package="${TARBALL}" diagrammo --version)"
          ahm_version="$(npx --yes --package="${TARBALL}" ahm-diagrammo --version)"
          [[ "${diagrammo_version}" == "${expected}" ]]
          [[ "${ahm_version}" == "${expected}" ]]

          cat > smoke.md <<'MARKDOWN'
          # Packed artifact smoke test

          ```mermaid
          flowchart BT
              child["Child"] --> root["Root"]
          ```
          MARKDOWN
          list_output="$(npx --yes --package="${TARBALL}" diagrammo smoke.md --list)"
          case "${list_output}" in
            *"1 mermaid block"*) ;;
            *)
              echo "packed CLI did not list the smoke-test block" >&2
              exit 1
              ;;
          esac
          printf 'diagrammo %s\nahm-diagrammo %s\n%s\n' \
            "${diagrammo_version}" "${ahm_version}" "${list_output}"
